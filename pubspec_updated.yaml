name: jarvis_voice_assistant
description: JARVIS - Voice Assistant with Alarm, Reminder & Habit Tracker (Ironman Style)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Voice & Audio
  flutter_tts: ^0.13.8
  speech_to_text: ^6.4.0
  just_audio: ^0.9.34  # NEW: For ringtone playback
  audio_session: ^0.1.13
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Time & Date
  intl: ^0.19.0
  
  # UI & Icons
  flutter_svg: ^2.0.7
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  
  # Local Notifications
  flutter_local_notifications: ^17.1.0
  timezone: ^0.9.2
  
  # State Management
  provider: ^6.1.0
  
  # Device Info
  device_info_plus: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/sounds/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
